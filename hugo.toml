baseURL = "https://comparatif-mode.com"
title = "Comparatif mode"
theme = "comparatif-mode"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

enableRobotsTXT = false
enableGitInfo = false

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Francais"
    weight = 1
    title = "Comparatif mode"
    contentDir = "content/fr"
    [languages.fr.params]
      description = "Comparatifs de mode homme et femme, guides d'achat et actualites."

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2
    title = "Comparatif mode"
    contentDir = "content/en"
    [languages.en.params]
      description = "Men and women fashion comparisons, buying guides and news."

[taxonomies]
  category = "categories"
  tag = "tags"

[[languages.fr.menus.main]]
  name = "Mode femme"
  url = "/categories/mode-femme/"
  weight = 1

[[languages.fr.menus.main]]
  name = "Mode homme"
  url = "/categories/mode-homme/"
  weight = 2

[[languages.fr.menus.main]]
  name = "Comparatifs"
  url = "/categories/comparatifs/"
  weight = 3

[[languages.fr.menus.main]]
  name = "Guides d'achat"
  url = "/categories/guides-dachat/"
  weight = 4

[[languages.fr.menus.main]]
  name = "Actualites"
  url = "/categories/actualites/"
  weight = 5

[[languages.fr.menus.main]]
  name = "Le Blog"
  url = "/blog/"
  weight = 99

[[languages.en.menus.main]]
  name = "Women's fashion"
  url = "/en/categories/womens-fashion/"
  weight = 1

[[languages.en.menus.main]]
  name = "Men's fashion"
  url = "/en/categories/mens-fashion/"
  weight = 2

[[languages.en.menus.main]]
  name = "Comparisons"
  url = "/en/categories/comparisons/"
  weight = 3

[[languages.en.menus.main]]
  name = "Buying guides"
  url = "/en/categories/buying-guides/"
  weight = 4

[[languages.en.menus.main]]
  name = "News"
  url = "/en/categories/news/"
  weight = 5

[[languages.en.menus.main]]
  name = "The Blog"
  url = "/en/blog/"
  weight = 99

[params]
  description = "Comparatifs de mode homme et femme, guides d'achat et actualites."
  default_og_image = "/images/og-default.jpg"
  logo = "/favicon.svg"
  founding_year = "2026"
  expertise = ["Mode femme", "Mode homme", "Comparatifs mode", "Guides d'achat mode", "Tendances mode"]
  og_locale_alternate = "en_US"

[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# Desactiver la minification XML pour avoir un sitemap lisible
[minify]
  disableXML = true

